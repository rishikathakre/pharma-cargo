<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pharma Cargo — Map Simulation</title>

    <!-- Leaflet served locally — avoids CDN blocks -->
    <link rel="stylesheet" href="/static/leaflet.css" />

    <style>
      :root {
        --bg: #0b1220;
        --panel: rgba(17, 24, 39, 0.92);
        --panel2: rgba(15, 23, 42, 0.85);
        --text: #e5e7eb;
        --muted: #9ca3af;
        --border: rgba(148, 163, 184, 0.22);
        --shadow: 0 12px 50px rgba(0, 0, 0, 0.35);
      }

      html,
      body {
        height: 100%;
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial,
          "Apple Color Emoji", "Segoe UI Emoji";
        background: #000;
        color: var(--text);
      }

      #app {
        height: 100%;
        display: grid;
        grid-template-columns: 1fr 360px;
      }

      #map {
        height: 100%;
        width: 100%;
      }

      #sidebar {
        height: 100%;
        overflow: auto;
        background: linear-gradient(180deg, rgba(2, 6, 23, 0.95), rgba(2, 6, 23, 0.85));
        border-left: 1px solid var(--border);
        box-shadow: var(--shadow);
        padding: 14px 14px 18px;
      }

      .section {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 12px;
        margin-bottom: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      }

      .title {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 10px;
        margin: 0 0 10px;
      }

      .title h3 {
        margin: 0;
        font-size: 14px;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        color: #cbd5e1;
      }

      .hint {
        color: var(--muted);
        font-size: 12px;
      }

      label {
        display: block;
        font-size: 12px;
        color: #cbd5e1;
        margin-bottom: 6px;
      }

      select,
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 10px 10px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--panel2);
        color: var(--text);
        outline: none;
      }

      .grid2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .row {
        margin-bottom: 10px;
      }

      .btnRow {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      button {
        cursor: pointer;
        border: 0;
        padding: 10px 12px;
        border-radius: 12px;
        font-weight: 650;
        color: #0b1220;
        background: linear-gradient(135deg, #93c5fd, #60a5fa);
        transition: transform 120ms ease, box-shadow 120ms ease, filter 120ms ease;
        box-shadow: 0 10px 24px rgba(96, 165, 250, 0.25);
      }

      button:hover {
        transform: translateY(-1px);
        filter: brightness(1.02);
      }

      button.secondary {
        background: linear-gradient(135deg, #94a3b8, #64748b);
        box-shadow: 0 10px 24px rgba(148, 163, 184, 0.18);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        padding: 4px 8px;
        border-radius: 999px;
        font-size: 11px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(0, 0, 0, 0.15);
        white-space: nowrap;
      }

      .badge.low { color: #86efac; border-color: rgba(34, 197, 94, 0.35); }
      .badge.medium { color: #fde047; border-color: rgba(234, 179, 8, 0.35); }
      .badge.high { color: #fdba74; border-color: rgba(249, 115, 22, 0.35); }
      .badge.critical { color: #fca5a5; border-color: rgba(220, 38, 38, 0.35); }

      .kv {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New",
          monospace;
        font-size: 11px;
        color: #cbd5e1;
        background: rgba(2, 6, 23, 0.55);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px;
        overflow: auto;
        max-height: 220px;
      }

      .list {
        display: grid;
        gap: 10px;
      }

      .shipRow,
      .alertCard {
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 10px;
        background: rgba(2, 6, 23, 0.45);
      }

      .shipTop {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        align-items: center;
        margin-bottom: 6px;
      }

      .shipId {
        font-weight: 700;
        font-size: 13px;
        color: #e2e8f0;
      }

      .shipMeta {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.35;
      }

      .alertCard.critical { border-color: rgba(220, 38, 38, 0.55); }
      .alertCard.high { border-color: rgba(249, 115, 22, 0.55); }
      .alertCard.medium { border-color: rgba(234, 179, 8, 0.55); }
      .alertCard.low { border-color: rgba(34, 197, 94, 0.45); }

      .alertActions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 10px;
      }

      .btnApprove {
        background: linear-gradient(135deg, #4ade80, #22c55e);
        box-shadow: 0 10px 24px rgba(34, 197, 94, 0.18);
      }
      .btnReject {
        background: linear-gradient(135deg, #f87171, #ef4444);
        box-shadow: 0 10px 24px rgba(239, 68, 68, 0.18);
      }

      .small {
        font-size: 12px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="map"></div>
      <div id="sidebar">
        <div class="section">
          <div class="title">
            <h3>Simulation Controls</h3>
            <span class="hint" id="status">Loading…</span>
          </div>

          <div class="row">
            <label for="originSelect">Origin</label>
            <input id="originSearch" placeholder="Search origin airport…" />
            <select id="originSelect"></select>
          </div>
          <div class="row">
            <label for="destSelect">Destination</label>
            <input id="destSearch" placeholder="Search destination airport…" />
            <select id="destSelect"></select>
          </div>

          <div class="row grid2">
            <div>
              <label for="originLat">Origin lat</label>
              <input id="originLat" placeholder="e.g. 19.0896" />
            </div>
            <div>
              <label for="originLon">Origin lon</label>
              <input id="originLon" placeholder="e.g. 72.8656" />
            </div>
          </div>
          <div class="row grid2">
            <div>
              <label for="destLat">Dest lat</label>
              <input id="destLat" placeholder="e.g. 37.6213" />
            </div>
            <div>
              <label for="destLon">Dest lon</label>
              <input id="destLon" placeholder="e.g. -122.3790" />
            </div>
          </div>

          <div class="row grid2">
            <div>
              <label for="durationSeconds">Sim flight time (s)</label>
              <input id="durationSeconds" type="number" min="1" step="1" value="45" title="On-screen trip duration in seconds" />
            </div>
            <div>
              <label for="speedMultiplier">Speed multiplier</label>
              <input id="speedMultiplier" type="number" min="1" step="1" value="10" title="Higher = faster movement" />
            </div>
          </div>

          <div class="row grid2">
            <div>
              <label for="originWeather">Origin weather</label>
              <select id="originWeather">
                <option value="RANDOM">Random</option>
                <option value="CALM">Calm</option>
                <option value="WIND">Wind</option>
                <option value="FOG">Fog</option>
                <option value="HEAT">Heat</option>
                <option value="STORM">Storm</option>
              </select>
            </div>
            <div>
              <label for="destWeather">Destination weather</label>
              <select id="destWeather">
                <option value="RANDOM">Random</option>
                <option value="CALM">Calm</option>
                <option value="WIND">Wind</option>
                <option value="FOG">Fog</option>
                <option value="HEAT">Heat</option>
                <option value="STORM">Storm</option>
              </select>
            </div>
          </div>

          <div class="row" style="margin-bottom:10px">
            <label for="productSelect">Cargo / Vaccine type</label>
            <select id="productSelect" style="width:100%">
              <optgroup label="Vaccines — Ultra-cold">
                <option value="mRNA-COVID">mRNA COVID-19 (Pfizer-BioNTech) −90 to −60°C</option>
                <option value="mRNA-COVID-MOD">mRNA COVID-19 (Moderna) −50 to −15°C</option>
                <option value="mRNA-FLU-A">mRNA Influenza A −80 to −60°C</option>
                <option value="mRNA-FLU-B">mRNA Influenza B −80 to −50°C</option>
                <option value="mRNA-RSV">mRNA RSV −80 to −60°C</option>
              </optgroup>
              <optgroup label="Vaccines — Refrigerated (2–8°C)">
                <option value="VACC-STANDARD" selected>Influenza / MMR (standard) 2–8°C</option>
                <option value="VACC-MMR">MMR (Measles-Mumps-Rubella) 2–8°C</option>
                <option value="VACC-IPV">Inactivated Polio (IPV) 2–8°C</option>
                <option value="VACC-DTP">DTP Combination 2–8°C</option>
                <option value="VACC-PENTA">Pentavalent (DTP-HepB-Hib) 2–8°C</option>
                <option value="VACC-ROTA">Rotavirus (Rotarix) 2–8°C</option>
                <option value="VACC-PCV13">Pneumococcal PCV13 2–8°C</option>
                <option value="VACC-MEN-A">Meningococcal A (MenAfriVac) 2–8°C</option>
                <option value="VACC-HPV">HPV (Gardasil-9) 2–8°C</option>
                <option value="VACC-DENGUE">Dengue (Dengvaxia) 2–8°C</option>
                <option value="VACC-CHOLERA">Oral Cholera (Shanchol) 2–8°C</option>
                <option value="VACC-MALARIA">Malaria RTS,S (Mosquirix) 2–8°C</option>
                <option value="VACC-COVID-AD">COVID-19 Adenoviral (Janssen) 2–8°C</option>
                <option value="VACC-SHINGRIX">Shingles (Shingrix) 2–8°C</option>
              </optgroup>
              <optgroup label="Vaccines — Frozen">
                <option value="VACC-OPV">Oral Polio (OPV) −20 to −10°C</option>
                <option value="VACC-YF">Yellow Fever −25 to −10°C</option>
                <option value="VACC-VARICELLA">Varicella −25 to −10°C</option>
                <option value="VACC-BCG">BCG (Tuberculosis) −25 to −10°C</option>
              </optgroup>
              <optgroup label="Biologics / Monoclonal Antibodies">
                <option value="BIO-SPECIALTY">Specialty Biologic (mAb) 2–8°C</option>
                <option value="BIO-ADALIMUMAB">Adalimumab (Humira) 2–8°C</option>
                <option value="BIO-TRASTUZUMAB">Trastuzumab (Herceptin) 2–8°C</option>
                <option value="BIO-PEMBROLIZUMAB">Pembrolizumab (Keytruda) 2–8°C</option>
                <option value="BIO-NIVOLUMAB">Nivolumab (Opdivo) 2–8°C</option>
                <option value="BIO-RITUXIMAB">Rituximab (Rituxan) 2–8°C</option>
              </optgroup>
              <optgroup label="Cell / Gene Therapy — Cryogenic">
                <option value="GENE-CAR-T">CAR-T (Kymriah) −196 to −150°C</option>
                <option value="GENE-CAR-T2">CAR-T (Yescarta) −196 to −150°C</option>
                <option value="GENE-ONASEMNO">Zolgensma (SMA) −90 to −60°C</option>
              </optgroup>
              <optgroup label="Blood Products">
                <option value="PLASMA-IVIG">IVIG 2–8°C</option>
                <option value="PLASMA-FROZEN">Fresh Frozen Plasma −30 to −18°C</option>
                <option value="PLASMA-FACTOR8">Factor VIII 2–8°C</option>
              </optgroup>
              <optgroup label="Oncology / High-value">
                <option value="ONCO-CARBOPLAT">Carboplatin 2–8°C</option>
                <option value="ONCO-DOCETAXEL">Docetaxel 2–8°C</option>
                <option value="NEURO-LECANEMAB">Lecanemab (Alzheimer's) 2–8°C</option>
              </optgroup>
              <optgroup label="Insulin / Endocrine">
                <option value="INSULIN-RAPID">Insulin Aspart (NovoRapid) 2–8°C</option>
                <option value="INSULIN-LONG">Insulin Glargine (Lantus) 2–8°C</option>
              </optgroup>
              <optgroup label="Antivirals / Antibiotics">
                <option value="ANTIVIRAL-REMO">Remdesivir −25 to −15°C</option>
                <option value="ANTIVIRAL-PAXLOV">Paxlovid 2–8°C</option>
                <option value="ANTI-MEROPENEM">Meropenem 2–8°C</option>
                <option value="ANTI-VANCOMYCIN">Vancomycin 2–8°C</option>
              </optgroup>
            </select>
          </div>

          <div class="btnRow">
            <button id="startBtn">Start</button>
            <button id="stopBtn" class="secondary">Stop</button>
          </div>
          <div class="btnRow" style="margin-top: 10px">
            <button id="resetBtn" class="secondary">Reset demo state</button>
            <button id="clearAuditBtn" class="secondary">Clear audit log</button>
          </div>
          <div class="small" style="margin-top: 10px">
            Tip: set destination weather to <b>Storm</b> to force holding + risk spikes.
          </div>

        <div class="section">
          <div class="title">
            <h3>Active Shipments</h3>
            <span class="hint">polls every 3s</span>
          </div>
          <div id="shipmentList" class="list"></div>
        </div>

        <div class="section">
          <div class="title">
            <h3>HITL Alerts</h3>
            <span class="hint">polls every 3s</span>
          </div>
          <div id="hitlAlerts" class="list"></div>
        </div>

        <div class="section">
          <div class="title">
            <h3>Active Simulation State</h3>
            <span class="hint" id="activeHint">—</span>
          </div>
          <pre class="kv" id="activeInfo">None</pre>
        </div>
      </div>
    </div>

    <script src="/static/leaflet.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
